<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simpli Notebooks - Comparativo Visual</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans">

    <header class="py-10 text-center">
        <h1 class="text-4xl font-black text-blue-400">Simpli <span class="text-white font-light">Monitor</span></h1>
        <p class="text-gray-400 mt-2 italic">A decisão inteligente baseada em dados reais</p>
    </header>

    <section class="max-w-5xl mx-auto px-4 mb-12">
        <div class="bg-gray-800 p-6 rounded-3xl border border-gray-700 shadow-2xl">
            <h3 class="text-xl font-bold mb-6 text-center text-blue-400 uppercase tracking-widest text-sm">Batalha de Desempenho</h3>
            <div class="h-[400px] flex justify-center">
                <canvas id="graficoComparativo"></canvas>
            </div>
        </div>
    </section>

    <main id="container-cards" class="max-w-5xl mx-auto px-4 pb-20 space-y-8">
        </main>

    <script>
        async function carregarDados() {
    try {
        const res = await fetch('ofertas.json');
        const data = await res.json();
        const lista = data.melhores_notebooks;

        // CORES DISTINTAS PARA CADA MODELO
        const cores = [
            'rgba(244, 63, 94, 0.5)',  // Rosa (Top 1)
            'rgba(59, 130, 246, 0.5)', // Azul (Top 2)
            'rgba(250, 204, 21, 0.5)', // Amarelo (Top 3)
            'rgba(34, 197, 94, 0.5)',  // Verde (Top 4)
            'rgba(168, 85, 247, 0.5)'  // Roxo (Top 5)
        ];

        // 1. CONFIGURAÇÃO DO GRÁFICO (REVISADA)
        const ctx = document.getElementById('graficoComparativo').getContext('2d');
        new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['Performance', 'Tela', 'Custo-Benefício'],
                datasets: lista.map((n, i) => ({
                    label: n.modelo.split(' ')[0] + ' ' + (n.modelo.split(' ')[1] || ''),
                    data: [n.notas?.performance || 5, n.notas?.tela || 5, n.notas?.custo_beneficio || 5],
                    fill: true,
                    backgroundColor: cores[i],
                    borderColor: cores[i].replace('0.5', '1'),
                    borderWidth: 2
                }))
            },
            options: {
                scales: {
                    r: {
                        angleLines: { color: '#374151' },
                        grid: { color: '#4b5563' },
                        pointLabels: { color: '#ffffff', font: { size: 12 } },
                        ticks: { display: false }, // LIMPEZA AQUI
                        min: 0, max: 10
                    }
                },
                plugins: { legend: { labels: { color: '#9ca3af' } } }
            }
        });

        // 2. GERAR CARDS COM ANÁLISE
        const cards = document.getElementById('container-cards');
        cards.innerHTML = lista.map(n => `
            <div class="bg-gray-800 border border-gray-700 rounded-3xl overflow-hidden shadow-2xl hover:border-blue-500 transition-all duration-300">
                <div class="md:flex">
                    <div class="md:w-1/3 bg-white p-6 flex items-center justify-center">
                        <img src="${n.foto}" class="max-h-32 object-contain" onerror="this.src='https://img.freepik.com/vetores-premium/laptop-isolado-no-fundo-branco-ilustracao-vetorial_24911-31405.jpg'">
                    </div>
                    <div class="p-8 md:w-2/3">
                        <div class="flex justify-between items-start mb-4">
                            <span class="text-blue-500 font-black text-4xl">#${n.posicao}</span>
                            <span class="text-3xl font-black text-green-400">${n.preco}</span>
                        </div>
                        <h2 class="text-2xl font-bold mb-4">${n.modelo}</h2>
                        
                        <div class="grid grid-cols-2 gap-4 text-xs bg-gray-900/50 p-4 rounded-xl mb-6 border border-gray-700">
                            <p><span class="text-gray-500 block font-bold uppercase">Processador</span>${n.cpu}</p>
                            <p><span class="text-gray-500 block font-bold uppercase">Memória</span>${n.ram}</p>
                        </div>

                        <div class="mb-8">
                            <h4 class="text-blue-400 text-xs font-bold uppercase mb-2 tracking-widest">Análise Simpli:</h4>
                            <p class="text-gray-300 text-sm italic leading-relaxed">"${n.analise}"</p>
                        </div>

                        <a href="${n.link}" target="_blank" class="block w-full bg-blue-600 hover:bg-blue-500 text-white text-center font-bold py-4 rounded-2xl transition-all shadow-lg hover:shadow-blue-500/20">
                            VER OFERTA AGORA
                        </a>
                    </div>
                </div>
            </div>
        `).join('');

    } catch (e) { console.error("Erro ao carregar dados:", e); }
}
carregarDados();
    </script>
</body>
</html>
