<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simpli Notebooks</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans">

    <header class="py-12 text-center">
        <h1 class="text-5xl font-black text-blue-500 italic tracking-tighter">Simpli <span class="text-white font-light">Monitor</span></h1>
        <p class="text-gray-400 mt-3">Curadoria técnica para uso doméstico e 60+</p>
        <p id="data-update" class="text-[10px] text-gray-600 mt-4 uppercase tracking-widest"></p>
    </header>

    <section class="max-w-4xl mx-auto px-4 mb-16">
        <div class="bg-gray-800/50 p-8 rounded-[40px] border border-gray-800 shadow-2xl">
            <h3 class="text-center text-xs font-bold text-gray-500 uppercase mb-8 tracking-[0.3em]">Batalha de Performance</h3>
            <div class="h-[350px] flex justify-center">
                <canvas id="graficoComparativo"></canvas>
            </div>
        </div>
    </section>

    <main id="container-cards" class="max-w-4xl mx-auto px-4 pb-32 space-y-10">
        <div class="text-center animate-pulse py-20 text-gray-500">Consultando base de dados em tempo real...</div>
    </main>

    <script>
        async function carregarDados() {
            try {
                const res = await fetch('ofertas.json');
                const data = await res.json();
                const lista = data.melhores_notebooks;

                document.getElementById('data-update').innerText = `Sincronizado em: ${new Date().toLocaleDateString('pt-BR')}`;

                const cores = ['#f43f5e', '#3b82f6', '#eab308', '#22c55e', '#a855f7'];

                // CONFIGURAÇÃO DO GRÁFICO
                const ctx = document.getElementById('graficoComparativo').getContext('2d');
                new Chart(ctx, {
                    type: 'radar',
                    data: {
                        labels: ['Performance', 'Tela', 'Custo-Benefício'],
                        datasets: lista.map((n, i) => ({
                            label: n.modelo.split(' ')[0] + ' ' + (n.modelo.split(' ')[1] || ''),
                            data: [n.notas?.performance || 5, n.notas?.tela || 5, n.notas?.custo_beneficio || 5],
                            backgroundColor: cores[i] + '33',
                            borderColor: cores[i],
                            borderWidth: 2,
                            pointRadius: 4
                        }))
                    },
                    options: {
                        scales: { r: { angleLines: {color:'#334155'}, grid: {color:'#334155'}, pointLabels: {color:'#94a3b8', font:{size:11}}, ticks: {display:false}, min:0, max:10 } },
                        plugins: { legend: { position:'bottom', labels:{color:'#64748b', font:{size:10}, usePointStyle:true} } }
                    }
                });

                // GERAR CARDS
                const cards = document.getElementById('container-cards');
                cards.innerHTML = lista.map(n => {
                    
                    // LÓGICA DIRETA: SEMPRE GOOGLE SHOPPING
                    const linkFinal = `https://www.google.com/search?q=comprar+notebook+${encodeURIComponent(n.modelo)}&tbm=shop`;

                    // MENSAGEM DO WHATSAPP
                    const textoWhats = encodeURIComponent(`Oi! Veja este notebook que o Simpli recomendou: ${n.modelo}. Pesquisa de preços aqui: ${linkFinal}`);
                    const linkWhats = `https://wa.me/?text=${textoWhats}`;

                    return `
                    <div class="bg-gray-800 border border-gray-700 rounded-[35px] overflow-hidden shadow-2xl">
                        <div class="md:flex">
                            <div class="md:w-1/3 bg-white p-10 flex items-center justify-center">
                                <img src="${n.foto}" class="max-h-36 object-contain" onerror="this.src='https://img.freepik.com/vetores-premium/laptop-isolado-no-fundo-branco-ilustracao-vetorial_24911-31405.jpg'">
                            </div>
                            <div class="p-10 md:w-2/3">
                                <div class="flex justify-between items-center mb-6">
                                    <span class="text-blue-500 font-black text-4xl">#${n.posicao}</span>
                                    <span class="text-2xl font-black text-green-400 bg-green-400/10 px-4 py-2 rounded-2xl">${n.preco}</span>
                                </div>
                                <h2 class="text-2xl font-bold mb-4">${n.modelo}</h2>
                                <div class="grid grid-cols-2 gap-4 text-[10px] bg-gray-900/50 p-5 rounded-3xl mb-8 border border-gray-700/50">
                                    <p><span class="text-gray-500 block font-bold mb-1 uppercase tracking-tighter">Processador</span>${n.cpu}</p>
                                    <p><span class="text-gray-500 block font-bold mb-1 uppercase tracking-tighter">Memória</span>${n.ram}</p>
                                </div>
                                <p class="text-gray-400 text-sm italic mb-10 leading-relaxed">"${n.analise}"</p>
                                
                                <div class="flex gap-3">
                                    <a href="${linkFinal}" target="_blank" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white text-center font-bold py-4 rounded-2xl transition-all shadow-lg shadow-blue-600/20">
                                        VER OFERTA AGORA
                                    </a>
                                    <a href="${linkWhats}" target="_blank" class="bg-green-600 hover:bg-green-500 text-white p-4 rounded-2xl transition-all flex items-center justify-center shadow-lg shadow-green-600/20">
                                        <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.893 11.892-1.99-.001-3.951-.5-5.688-1.448l-6.305 1.654zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.438 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884-.001 2.225.651 3.891 1.746 5.634l-.999 3.648 3.742-.981zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.521.151-.172.2-.296.3-.495.099-.198.05-.372-.025-.521-.075-.148-.669-1.611-.916-2.206-.242-.579-.487-.501-.669-.51l-.57-.01c-.198 0-.52.074-.792.372s-1.04 1.016-1.04 2.479 1.065 2.876 1.213 3.074c.149.198 2.095 3.2 5.076 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.695.248-1.29.173-1.414z"/></svg>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                    `;
                }).join('');

            } catch (e) {
                console.error(e);
                document.getElementById('container-cards').innerHTML = "<p class='text-center text-red-500'>Erro ao carregar dados. Verifique o console.</p>";
            }
        }
        carregarDados();
    </script>
</body>
</html>
